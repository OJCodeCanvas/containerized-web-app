<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Task Tracker</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="app">
    <h1>Task Tracker</h1>
    <form id="task-form">
      <input
        type="text"
        id="task-input"
        placeholder="Add a new task..."
        autocomplete="off"
        required
      />
      <button type="submit">Add</button>
    </form>
    <ul id="task-list"></ul>
    <p class="footer">Served from a Dockerized vanilla JS app</p>
  </main>
  <script src="app.js"></script>
</body>
</html>
